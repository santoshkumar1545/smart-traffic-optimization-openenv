<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Traffic Optimization Dashboard</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1, h2, h3 {
      text-align: center;
    }

    h1 {
      color: #38bdf8;
    }

    .container {
      max-width: 1400px;
      margin: auto;
    }

    .upload-box, .dashboard-card {
      background: rgba(30, 41, 59, 0.95);
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .road-input {
      padding: 15px;
      background: #334155;
      border-radius: 12px;
    }

    button {
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      color: black;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
    }

    button:hover {
      transform: scale(1.03);
    }

    #dashboard {
      display: none;
      margin-top: 30px;
    }

    #timer {
      text-align: center;
      color: #22c55e;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .junction-container {
      position: relative;
      width: 540px;
      height: 540px;
      margin: 30px auto;
      background: #0b1220;
      border-radius: 24px;
      overflow: hidden;
      border: 3px solid #38bdf8;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.25);
    }

    .road {
      position: absolute;
      background: #475569;
      transition: 0.5s;
      overflow: hidden;
    }

    .road1 { top: 0; left: 200px; width: 140px; height: 200px; }
    .road2 { top: 200px; right: 0; width: 200px; height: 140px; }
    .road3 { bottom: 0; left: 200px; width: 140px; height: 200px; }
    .road4 { top: 200px; left: 0; width: 200px; height: 140px; }

    .center-box {
      position: absolute;
      top: 200px;
      left: 200px;
      width: 140px;
      height: 140px;
      background: #1e293b;
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      z-index: 5;
    }

    .vehicle {
      position: absolute;
      width: 20px;
      height: 12px;
      background: white;
      border-radius: 4px;
      opacity: 0.9;
      box-shadow: 0 0 8px rgba(255,255,255,0.6);
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .lane-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .lane-card {
      background: rgba(30, 41, 59, 0.95);
      padding: 18px;
      border-radius: 18px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    .lane-preview {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 2px solid #334155;
    }

    .mini-road {
      position: relative;
      height: 120px;
      background: #334155;
      border-radius: 14px;
      overflow: hidden;
      margin-top: 15px;
      border: 2px solid #475569;
    }

    .mini-vehicle {
      position: absolute;
      width: 18px;
      height: 10px;
      background: #fff;
      border-radius: 4px;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .signal-badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: bold;
      margin-top: 10px;
    }

    .green {
      background: #16a34a;
      color: white;
    }

    .red {
      background: #dc2626;
      color: white;
    }

    .priority {
      border: 2px solid #22c55e !important;
      box-shadow: 0 0 20px #22c55e !important;
    }

    .bar-container {
      background: #334155;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
      height: 18px;
    }

    .bar {
      height: 100%;
      transition: width 1.2s ease-in-out;
    }

    @keyframes moveDown {
      from { transform: translateY(-20px); }
      to { transform: translateY(180px); }
    }

    @keyframes moveLeft {
      from { transform: translateX(20px); }
      to { transform: translateX(-180px); }
    }

    @keyframes moveUp {
      from { transform: translateY(20px); }
      to { transform: translateY(-180px); }
    }

    @keyframes moveRight {
      from { transform: translateX(-20px); }
      to { transform: translateX(180px); }
    }

    @keyframes moveMini {
      from { transform: translateX(-30px); }
      to { transform: translateX(350px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚦 AI Traffic Optimization Dashboard</h1>
    <p style="text-align:center;">Upload 4 road images and simulate a smart 4-way traffic junction.</p>

    <div class="upload-box">
      <div class="grid">
        <div class="road-input">
          <label>Road 1 Image</label><br>
          <input type="file" id="road1" accept="image/*" />
        </div>
        <div class="road-input">
          <label>Road 2 Image</label><br>
          <input type="file" id="road2" accept="image/*" />
        </div>
        <div class="road-input">
          <label>Road 3 Image</label><br>
          <input type="file" id="road3" accept="image/*" />
        </div>
        <div class="road-input">
          <label>Road 4 Image</label><br>
          <input type="file" id="road4" accept="image/*" />
        </div>
      </div>

      <div style="margin-top:20px;">
        <label><strong>Emergency Vehicle Override:</strong></label>
        <select id="emergencyRoad" style="padding:10px; border-radius:10px; margin-left:10px;">
          <option value="">None</option>
          <option value="Road1">Road 1</option>
          <option value="Road2">Road 2</option>
          <option value="Road3">Road 3</option>
          <option value="Road4">Road 4</option>
        </select>
      </div>

      <div style="text-align:center;">
        <button onclick="analyzeTraffic()">Analyze Traffic</button>
      </div>
    </div>

    <div id="dashboard">
      <div id="timer">Waiting...</div>

      <div class="dashboard-card">
        <h2>🌐 Main Junction Visualization</h2>
        <div class="junction-container">
          <div class="road road1" id="junction-road1"></div>
          <div class="road road2" id="junction-road2"></div>
          <div class="road road3" id="junction-road3"></div>
          <div class="road road4" id="junction-road4"></div>
          <div class="center-box">🚦 Junction</div>
        </div>
      </div>

      <h2>🛣 Individual Lane Dashboards</h2>
      <div class="lane-grid" id="laneGrid"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
