<!DOCTYPE html>
<html>
<head>
    <title>Traffic Prediction</title>
</head>
<body>

<h2>Upload Traffic Images</h2>

<form id="uploadForm" enctype="multipart/form-data">
    
    Road 1: <input type="file" name="road1"><br><br>
    Road 2: <input type="file" name="road2"><br><br>
    Road 3: <input type="file" name="road3"><br><br>
    Road 4: <input type="file" name="road4"><br><br>

    Emergency Road:
    <input type="text" name="emergencyRoad" placeholder="Road1"><br><br>

    <button type="submit">Predict</button>
</form>

<h3>Results:</h3>
<pre id="result"></pre>

<script>
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const response = await fetch("/predict", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    document.getElementById("result").innerText = JSON.stringify(data, null, 2);
});
</script>

</body>
</html>
