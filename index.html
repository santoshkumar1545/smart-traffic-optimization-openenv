<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Traffic Optimization</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            background: white;
            color: black;
            width: 90%;
            max-width: 700px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .road {
            margin-bottom: 15px;
            text-align: left;
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            font-size: 16px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .preview {
            width: 100%;
            max-height: 150px;
            margin-top: 10px;
            object-fit: cover;
            border-radius: 10px;
            display: none;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #f4f4f4;
            color: black;
            border-radius: 10px;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
        }

        .loading {
            display: none;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

<h1>🚦 Smart Traffic Optimization</h1>

<div class="container">

    <form id="uploadForm" enctype="multipart/form-data">

        <div class="road">
            <label>Road 1 Image</label>
            <input type="file" name="road1" onchange="previewImage(this, 'img1')">
            <img id="img1" class="preview">
        </div>

        <div class="road">
            <label>Road 2 Image</label>
            <input type="file" name="road2" onchange="previewImage(this, 'img2')">
            <img id="img2" class="preview">
        </div>

        <div class="road">
            <label>Road 3 Image</label>
            <input type="file" name="road3" onchange="previewImage(this, 'img3')">
            <img id="img3" class="preview">
        </div>

        <div class="road">
            <label>Road 4 Image</label>
            <input type="file" name="road4" onchange="previewImage(this, 'img4')">
            <img id="img4" class="preview">
        </div>

        <div class="road">
            <label>Emergency Road (optional)</label>
            <input type="text" name="emergencyRoad" placeholder="Example: Road1">
        </div>

        <button type="submit">🚀 Analyze Traffic</button>

        <p class="loading" id="loading">⏳ Processing...</p>

    </form>

    <div class="result-box" id="result"></div>

</div>

<script>
// Image preview
function previewImage(input, imgId) {
    const file = input.files[0];
    const preview = document.getElementById(imgId);

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
}

// Form submit
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const loading = document.getElementById("loading");
    const resultBox = document.getElementById("result");

    loading.style.display = "block";
    resultBox.innerText = "";

    const formData = new FormData(this);

    try {
        const response = await fetch("/predict", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error("Server error: " + response.status);
        }

        const data = await response.json();

        loading.style.display = "none";

        // Pretty output
        let output = "🚦 TRAFFIC ANALYSIS RESULT\n\n";

        for (let road in data.vehicle_counts) {
            output += `🚗 ${road}\n`;
            output += `Vehicles: ${data.vehicle_counts[road]}\n`;
            output += `Traffic: ${data.predictions[road]}\n`;
            output += `Signal Time: ${data.signal_times[road]} sec\n\n`;
        }

        output += `🔥 Priority Road: ${data.priority_road}\n`;

        resultBox.innerText = output;

    } catch (error) {
        loading.style.display = "none";
        resultBox.innerText = "❌ Error: " + error.message;
        console.error(error);
    }
});
</script>

</body>
</html>
