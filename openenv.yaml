name: traffic-junction-ai
description: AI-powered 4-road junction traffic optimization environment using uploaded traffic images.
version: 1.0.0

environment:
  module: env.environment
  class: TrafficEnvironment

tasks:
  - id: easy
    description: Analyze traffic density for 4 roads and assign signal timings.
  - id: medium
    description: Optimize green signal allocation based on lane congestion.
  - id: hard
    description: Simulate intelligent priority assignment for a 4-road intersection.